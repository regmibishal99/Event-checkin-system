<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Event Scanner</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        html, body {
            min-height: 100%;
        }
        body {
            font-family: 'Inter', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: linear-gradient(180deg, #f3f7fb 0%, #e9eef4 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 24px;
            color: #334155;
        }
        .container {
            background: #ffffff;
            padding: 34px 30px;
            border-radius: 24px;
            box-shadow: 0 22px 60px rgba(15, 23, 42, 0.08);
            max-width: 520px;
            width: 100%;
            text-align: center;
            border: 1px solid rgba(148, 163, 184, 0.18);
        }
        h1 {
            color: #102a43;
            margin-bottom: 8px;
            font-size: 32px;
            letter-spacing: -0.02em;
        }
        .subtitle {
            color: #627d98;
            margin-bottom: 28px;
            font-size: 15px;
            line-height: 1.6;
        }
        #video-container {
            position: relative;
            width: 100%;
            max-width: 460px;
            margin: 0 auto 24px;
            border-radius: 20px;
            overflow: hidden;
            background: #0f172a;
            border: 1px solid rgba(96, 165, 250, 0.2);
        }
        #video {
            width: 100%;
            display: block;
            min-height: 280px;
            background: #000;
        }
        .button-row {
            display: flex;
            justify-content: center;
            gap: 12px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }
        .btn {
            background: #2563eb;
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s ease, background-color 0.2s ease, box-shadow 0.2s ease;
            box-shadow: 0 12px 24px rgba(37, 99, 235, 0.16);
        }
        .btn:hover {
            background: #1d4ed8;
            transform: translateY(-1px);
            box-shadow: 0 16px 28px rgba(37, 99, 235, 0.18);
        }
        .btn-danger {
            background: #dc2626;
            box-shadow: 0 12px 24px rgba(220, 38, 38, 0.15);
        }
        .btn-danger:hover {
            background: #b91c1c;
        }
        .btn-success {
            background: #16a34a;
            box-shadow: 0 12px 24px rgba(22, 163, 74, 0.14);
        }
        .btn-success:hover {
            background: #15803d;
        }
        #result {
            margin: 22px 0;
            padding: 18px;
            border-radius: 16px;
            font-size: 17px;
            font-weight: 600;
            min-height: 64px;
            text-align: left;
            line-height: 1.5;
            border: 1px solid transparent;
        }
        .success {
            background: #ecfdf5;
            color: #065f46;
            border-color: #d1fae5;
        }
        .error {
            background: #fef2f2;
            color: #991b1b;
            border-color: #fecaca;
        }
        .info {
            background: #eff6ff;
            color: #1d4ed8;
            border-color: #bfdbfe;
        }
        #walkin-form {
            display: none;
            margin-top: 22px;
            padding: 24px;
            background: #f8fafc;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.16);
            text-align: left;
        }
        #walkin-form h3 {
            margin-bottom: 16px;
            color: #0f172a;
            font-size: 19px;
        }
        #walkin-form input {
            width: 100%;
            padding: 14px 16px;
            margin: 10px 0;
            border: 1px solid #cbd5e1;
            border-radius: 12px;
            font-size: 15px;
            color: #0f172a;
            background: #ffffff;
        }
        #walkin-form input:focus {
            outline: none;
            border-color: #2563eb;
            box-shadow: 0 0 0 4px rgba(37, 99, 235, 0.12);
        }
        .stats {
            display: flex;
            justify-content: space-between;
            gap: 12px;
            margin-top: 24px;
            padding: 18px;
            background: #f8fafc;
            border-radius: 18px;
            border: 1px solid rgba(148, 163, 184, 0.16);
        }
        .stat-item {
            flex: 1;
            text-align: center;
        }
        .stat-number {
            font-size: 28px;
            font-weight: 700;
            color: #0f172a;
        }
        .stat-label {
            margin-top: 6px;
            font-size: 13px;
            color: #64748b;
            letter-spacing: 0.02em;
            text-transform: uppercase;
        }
        .hidden {
            display: none;
        }
        #scan-status {
            font-size: 14px;
            color: #64748b;
            margin: 12px 0 0;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🎫 Event Scanner</h1>
    <p class="subtitle">Scan QR code to check-in guests</p>
    
    <div id="video-container">
        <video id="video" playsinline></video>
    </div>
    
    <div>
        <button class="btn" onclick="startScanner()">📷 Start Camera</button>
        <button class="btn btn-danger" onclick="stopScanner()">⏹ Stop</button>
    </div>
    
    <div id="scan-status">Camera is off</div>
    
    <div id="result" class="info">
        📱 Scan a QR code
    </div>
    
    <!-- Walk-in Registration Form -->
    <div id="walkin-form">
        <h3>🆕 New Guest Registration</h3>
        <form onsubmit="registerWalkin(event)">
            <input type="text" id="name" placeholder="Full Name *" required>
            <input type="email" id="email" placeholder="Email *" required>
            <input type="tel" id="phone" placeholder="Phone Number">
            <button type="submit" class="btn btn-success" style="width:100%;">Register & Check-in</button>
        </form>
        <button class="btn" onclick="closeWalkinForm()" style="width:100%; margin-top:10px;">Cancel</button>
    </div>
    
    <!-- Stats -->
    <div class="stats">
        <div class="stat-item">
            <div class="stat-number" id="total-count">0</div>
            <div class="stat-label">Total Guests</div>
        </div>
        <div class="stat-item">
            <div class="stat-number" id="checked-count">0</div>
            <div class="stat-label">Checked In</div>
        </div>
    </div>
</div>

<!-- QR Scanner Library -->
<script src="https://cdn.jsdelivr.net/npm/instascan@1.0.0/instascan.min.js"></script>

<script>
// ============================================
// CONFIGURATION - CHANGE THIS!
// ============================================
const APP_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';
// Example: 'https://script.google.com/macros/s/ABC123.../exec'

// ============================================
// QR SCANNER
// ============================================
let scanner = null;
let isScanning = false;

function startScanner() {
    if (isScanning) return;
    
    document.getElementById('scan-status').textContent = '🔍 Initializing camera...';
    
    Instascan.Camera.getCameras()
        .then(cameras => {
            if (cameras.length === 0) {
                throw new Error('No cameras found');
            }
            
            // Use rear camera if available, otherwise first camera
            const selectedCamera = cameras.find(cam => cam.name.toLowerCase().includes('back')) || cameras[0];
            
            scanner = new Instascan.Scanner({
                video: document.getElementById('video'),
                mirror: false,
                captureImage: false,
                backgroundScan: false
            });
            
            scanner.addListener('scan', function(content) {
                // content = the QR code data (should be the ID)
                handleScan(content);
            });
            
            scanner.start(selectedCamera);
            isScanning = true;
            document.getElementById('scan-status').textContent = '✅ Camera active - Scan a QR code';
            document.getElementById('result').className = 'info';
            document.getElementById('result').textContent = '📱 Scanning...';
            
            // Hide walk-in form
            document.getElementById('walkin-form').style.display = 'none';
            
        })
        .catch(err => {
            alert('Camera error: ' + err.message);
            document.getElementById('scan-status').textContent = '❌ Camera error: ' + err.message;
        });
}

function stopScanner() {
    if (scanner) {
        scanner.stop();
        isScanning = false;
        document.getElementById('scan-status').textContent = '⏹ Camera stopped';
        document.getElementById('result').className = 'info';
        document.getElementById('result').textContent = '📱 Camera is off';
    }
}

// ============================================
// HANDLE QR SCAN
// ============================================
function handleScan(guestID) {
    // Play sound
    playSound('scan');
    
    // Show scanning status
    document.getElementById('result').className = 'info';
    document.getElementById('result').textContent = '⏳ Checking guest...';
    
    // Send to Google Sheets
    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'checkin',
            id: guestID.trim()
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            // ✅ Check-in successful
            document.getElementById('result').className = 'success';
            document.getElementById('result').textContent = '✅ ' + data.name + ' checked in!';
            playSound('success');
            updateStats();
            
        } else if (data.status === 'walkin') {
            // 🆕 Walk-in - Show registration form
            document.getElementById('result').className = 'info';
            document.getElementById('result').textContent = '🆕 New guest! Please register below.';
            document.getElementById('walkin-form').style.display = 'block';
            playSound('walkin');
            
        } else if (data.status === 'error') {
            // ❌ Error
            document.getElementById('result').className = 'error';
            document.getElementById('result').textContent = data.message || '❌ Error!';
            playSound('error');
            
        } else {
            document.getElementById('result').className = 'error';
            document.getElementById('result').textContent = '❌ Unknown error';
        }
    })
    .catch(error => {
        document.getElementById('result').className = 'error';
        document.getElementById('result').textContent = '❌ Network error! Check connection.';
        console.error('Error:', error);
    });
}

// ============================================
// WALK-IN REGISTRATION
// ============================================
function registerWalkin(e) {
    e.preventDefault();
    
    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();
    
    if (!name || !email) {
        alert('Please fill in Name and Email');
        return;
    }
    
    // Show loading
    document.getElementById('result').className = 'info';
    document.getElementById('result').textContent = '⏳ Registering...';
    
    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'register',
            name: name,
            email: email,
            phone: phone
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('result').className = 'success';
            document.getElementById('result').textContent = '✅ ' + data.name + ' registered & checked in!';
            document.getElementById('walkin-form').style.display = 'none';
            document.getElementById('walkin-form').reset();
            playSound('success');
            updateStats();
        } else {
            document.getElementById('result').className = 'error';
            document.getElementById('result').textContent = '❌ Registration failed: ' + (data.message || 'Error');
        }
    })
    .catch(error => {
        document.getElementById('result').className = 'error';
        document.getElementById('result').textContent = '❌ Network error!';
    });
}

function closeWalkinForm() {
    document.getElementById('walkin-form').style.display = 'none';
    document.getElementById('walkin-form').reset();
    document.getElementById('result').className = 'info';
    document.getElementById('result').textContent = '📱 Scan a QR code';
}

// ============================================
// STATS DASHBOARD
// ============================================
function updateStats() {
    fetch(APP_SCRIPT_URL + '?action=getStats')
        .then(response => response.json())
        .then(data => {
            if (data && data.total !== undefined) {
                document.getElementById('total-count').textContent = data.total;
                document.getElementById('checked-count').textContent = data.checked;
            }
        })
        .catch(() => {});
}

// ============================================
// SOUND EFFECTS (Simple)
// ============================================
function playSound(type) {
    try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioContext.createOscillator();
        const gainNode = audioContext.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioContext.destination);
        
        if (type === 'success') {
            // Happy ascending tone
            oscillator.frequency.setValueAtTime(880, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(1100, audioContext.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.2);
        } else if (type === 'error') {
            // Low sad tone
            oscillator.frequency.setValueAtTime(300, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.2, audioContext.currentTime);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.3);
        } else if (type === 'scan') {
            // Quick beep
            oscillator.frequency.setValueAtTime(600, audioContext.currentTime);
            gainNode.gain.setValueAtTime(0.1, audioContext.currentTime);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.05);
        } else if (type === 'walkin') {
            // Attention sound
            oscillator.frequency.setValueAtTime(500, audioContext.currentTime);
            oscillator.frequency.setValueAtTime(700, audioContext.currentTime + 0.1);
            gainNode.gain.setValueAtTime(0.15, audioContext.currentTime);
            oscillator.start();
            oscillator.stop(audioContext.currentTime + 0.2);
        }
    } catch(e) {
        // Silent fallback
    }
}

// ============================================
// LOAD STATS ON PAGE LOAD
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    updateStats();
    // Auto-start camera
    setTimeout(startScanner, 500);
});
</script>

</body>
</html>
