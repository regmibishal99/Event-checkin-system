<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Event Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0;
            margin: 0;
        }
        
        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            width: 100%;
            padding: 20px;
            text-align: center;
            box-shadow: 0 4px 20px rgba(0,0,0,0.3);
            z-index: 10;
        }
        
        .header h1 {
            font-size: 24px;
            font-weight: 700;
            letter-spacing: 1px;
        }
        
        .header p {
            font-size: 14px;
            opacity: 0.9;
            margin-top: 5px;
        }
        
        .scanner-container {
            position: relative;
            width: 100%;
            max-width: 500px;
            aspect-ratio: 1/1;
            background: #1a1a1a;
            margin: 10px auto;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #667eea;
            box-shadow: 0 0 40px rgba(102, 126, 234, 0.3);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        #video.active {
            display: block;
        }
        
        .placeholder-text {
            color: rgba(255,255,255,0.3);
            font-size: 20px;
            text-align: center;
            pointer-events: none;
            padding: 20px;
        }
        
        .placeholder-text .icon {
            font-size: 60px;
            display: block;
            margin-bottom: 15px;
        }
        
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: none;
        }
        
        .scan-overlay.active {
            display: block;
        }
        
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 3px solid rgba(102, 126, 234, 0.8);
            border-radius: 20px;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.5);
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 3px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: scan 2s infinite;
            border-radius: 2px;
        }
        
        @keyframes scan {
            0% { transform: translate(-50%, -60%); }
            50% { transform: translate(-50%, 60%); }
            100% { transform: translate(-50%, -60%); }
        }
        
        .controls {
            display: flex;
            gap: 15px;
            padding: 15px;
            width: 100%;
            max-width: 500px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 14px 30px;
            border: none;
            border-radius: 50px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
            max-width: 200px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:active {
            transform: scale(0.95);
        }
        
        .btn-danger {
            background: linear-gradient(135deg, #f093fb, #f5576c);
            color: white;
            box-shadow: 0 4px 15px rgba(245, 87, 108, 0.4);
        }
        
        .btn-success {
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: white;
        }
        
        .btn-secondary {
            background: rgba(255,255,255,0.1);
            color: white;
            border: 1px solid rgba(255,255,255,0.2);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none !important;
        }
        
        #result {
            width: 100%;
            max-width: 500px;
            padding: 15px 20px;
            margin: 5px 15px;
            border-radius: 15px;
            font-size: 16px;
            font-weight: 600;
            text-align: center;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            transition: all 0.3s;
            word-break: break-word;
        }
        
        .result-info {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
            border: 1px solid rgba(102, 126, 234, 0.3);
        }
        
        .result-success {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
            border: 1px solid rgba(72, 187, 120, 0.3);
        }
        
        .result-error {
            background: rgba(245, 87, 108, 0.2);
            color: #f5576c;
            border: 1px solid rgba(245, 87, 108, 0.3);
        }
        
        .result-walkin {
            background: rgba(251, 191, 36, 0.2);
            color: #f6ad55;
            border: 1px solid rgba(251, 191, 36, 0.3);
        }
        
        #walkin-form {
            display: none;
            width: 100%;
            max-width: 500px;
            padding: 20px;
            background: rgba(255,255,255,0.05);
            border-radius: 15px;
            margin: 10px 15px;
            border: 1px solid rgba(255,255,255,0.1);
        }
        
        #walkin-form h3 {
            text-align: center;
            margin-bottom: 15px;
            color: #f6ad55;
        }
        
        #walkin-form input {
            width: 100%;
            padding: 14px;
            margin: 8px 0;
            border: 2px solid rgba(255,255,255,0.1);
            border-radius: 12px;
            font-size: 16px;
            background: rgba(255,255,255,0.05);
            color: white;
            transition: all 0.3s;
        }
        
        #walkin-form input:focus {
            outline: none;
            border-color: #667eea;
            background: rgba(255,255,255,0.1);
        }
        
        #walkin-form input::placeholder {
            color: rgba(255,255,255,0.5);
        }
        
        #status-text {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            margin: 5px 0;
            text-align: center;
            padding: 0 15px;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,0.3);
            border-radius: 50%;
            border-top-color: #fff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        
        @media (max-width: 480px) {
            .header h1 { font-size: 20px; }
            .btn { padding: 12px 20px; font-size: 14px; min-width: 100px; }
            #result { font-size: 14px; padding: 12px 15px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎫 Event Scanner</h1>
    <p>Scan QR code to check-in</p>
</div>

<div class="scanner-container">
    <video id="video" playsinline autoplay></video>
    <div class="placeholder-text" id="placeholderText">
        <span class="icon">📷</span>
        Tap "Start Camera"<br>
        <small style="font-size:14px; opacity:0.6;">Camera will open automatically</small>
    </div>
    <div class="scan-overlay" id="scanOverlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
    </div>
</div>

<div id="status-text">📱 Tap "Start Camera" to begin</div>

<div class="controls">
    <button class="btn btn-primary" id="startBtn" onclick="startScanner()">📷 Start Camera</button>
    <button class="btn btn-danger" id="stopBtn" onclick="stopScanner()" disabled>⏹ Stop</button>
</div>

<div id="result" class="result-info">📱 Scan a QR code</div>

<div id="walkin-form">
    <h3>🆕 New Guest Registration</h3>
    <form onsubmit="registerWalkin(event)">
        <input type="text" id="name" placeholder="Full Name *" required>
        <input type="email" id="email" placeholder="Email *" required>
        <input type="tel" id="phone" placeholder="Phone Number">
        <button type="submit" class="btn btn-success" style="width:100%;">✅ Register & Check-in</button>
    </form>
    <button class="btn btn-secondary" onclick="closeWalkinForm()" style="width:100%; margin-top:10px;">✕ Cancel</button>
</div>

<!-- ========================================== -->
<!-- QR SCANNER - Using jsQR (Most Reliable) -->
<!-- ========================================== -->
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js">
</script>

<script>
// ============================================
// CONFIGURATION - CHANGE THIS!
// ============================================
const APP_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbyRAk0lMbS_0MrJCrBSKDxot6WmVAmqmxN8VCNxcrNJvXNhTErFUUcGLVy1SM_aVnm6/exec';

// ============================================
// VARIABLES
// ============================================
let stream = null;
let isScanning = false;
let animationId = null;
let lastScanned = '';
let scanInterval = null;

// ============================================
// START SCANNER - Direct Approach
// ============================================
function startScanner() {
    const startBtn = document.getElementById('startBtn');
    const statusText = document.getElementById('status-text');
    const video = document.getElementById('video');
    const placeholderText = document.getElementById('placeholderText');
    const scanOverlay = document.getElementById('scanOverlay');
    
    // If already scanning, stop first
    if (isScanning) {
        stopScanner();
        setTimeout(() => startScanner(), 500);
        return;
    }
    
    startBtn.disabled = true;
    startBtn.innerHTML = '<span class="loading"></span> Loading...';
    statusText.textContent = '🔍 Requesting camera access...';
    document.getElementById('result').className = 'result-info';
    document.getElementById('result').textContent = '⏳ Starting camera...';

    // DIRECT CAMERA ACCESS - No library needed for this part
    const constraints = {
        video: {
            facingMode: 'environment',
            width: { ideal: 640 },
            height: { ideal: 480 }
        },
        audio: false
    };

    navigator.mediaDevices.getUserMedia(constraints)
        .then(function(mediaStream) {
            // Save stream for later
            stream = mediaStream;
            
            // Connect stream to video
            video.srcObject = mediaStream;
            video.style.display = 'block';
            video.classList.add('active');
            placeholderText.style.display = 'none';
            scanOverlay.classList.add('active');
            
            // Play video
            video.play().then(() => {
                isScanning = true;
                statusText.textContent = '✅ Camera active - Scanning for QR...';
                startBtn.innerHTML = '📷 Active';
                startBtn.disabled = false;
                document.getElementById('stopBtn').disabled = false;
                document.getElementById('result').className = 'result-info';
                document.getElementById('result').textContent = '📱 Scanning for QR code...';
                
                // Start QR scanning
                startQRScanning();
            }).catch(function(err) {
                console.error('Video play error:', err);
                statusText.textContent = '❌ Error playing video: ' + err.message;
                startBtn.innerHTML = '📷 Start Camera';
                startBtn.disabled = false;
                stopScanner();
            });
        })
        .catch(function(error) {
            console.error('Camera error:', error);
            
            let errorMsg = '';
            if (error.name === 'NotAllowedError' || error.name === 'PermissionDeniedError') {
                errorMsg = 'Camera permission denied. Please allow camera access in your browser settings.';
            } else if (error.name === 'NotFoundError' || error.name === 'DevicesNotFoundError') {
                errorMsg = 'No camera found on this device.';
            } else if (error.name === 'NotReadableError' || error.name === 'TrackStartError') {
                errorMsg = 'Camera is in use by another application.';
            } else if (error.name === 'OverconstrainedError') {
                errorMsg = 'Camera constraints cannot be satisfied.';
            } else {
                errorMsg = error.message;
            }
            
            statusText.textContent = '❌ ' + errorMsg;
            startBtn.innerHTML = '📷 Start Camera';
            startBtn.disabled = false;
            document.getElementById('result').className = 'result-error';
            document.getElementById('result').textContent = '❌ Camera error';
            
            // Show detailed instructions
            alert('❌ Camera Error\n\n' + errorMsg + '\n\n' +
                  '📱 To fix:\n' +
                  '• iPhone: Settings → Safari → Camera → Allow\n' +
                  '• Android: Settings → Apps → Chrome → Permissions → Camera → Allow\n' +
                  '• Or use a different browser (Chrome or Safari)\n\n' +
                  'After changing settings, refresh and try again.');
        });
}

// ============================================
// QR SCANNING USING jsQR
// ============================================
function startQRScanning() {
    const video = document.getElementById('video');
    const canvas = document.createElement('canvas');
    const context = canvas.getContext('2d', { willReadFrequently: true });
    
    let scanning = true;
    
    function scanFrame() {
        if (!scanning || !isScanning) return;
        
        try {
            // Set canvas size to match video
            canvas.width = video.videoWidth || 640;
            canvas.height = video.videoHeight || 480;
            
            if (canvas.width > 0 && canvas.height > 0) {
                // Draw video frame to canvas
                context.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Get image data
                const imageData = context.getImageData(0, 0, canvas.width, canvas.height);
                
                // Decode QR code using jsQR
                const code = jsQR(imageData.data, imageData.width, imageData.height, {
                    inversionAttempts: "dontInvert",
                });
                
                if (code && code.data) {
                    const qrData = code.data.trim();
                    
                    // Prevent duplicate scans
                    if (lastScanned !== qrData) {
                        lastScanned = qrData;
                        handleScan(qrData);
                        
                        // Reset after 2 seconds
                        setTimeout(() => {
                            lastScanned = '';
                        }, 2000);
                    }
                }
            }
        } catch (e) {
            // Silent fail - continue scanning
        }
        
        // Request next frame
        if (scanning && isScanning) {
            animationId = requestAnimationFrame(scanFrame);
        }
    }
    
    // Start scanning loop
    scanning = true;
    scanFrame();
    
    // Store cleanup function
    window.__cleanupScanner = function() {
        scanning = false;
        if (animationId) {
            cancelAnimationFrame(animationId);
            animationId = null;
        }
    };
}

// ============================================
// STOP SCANNER
// ============================================
function stopScanner() {
    const video = document.getElementById('video');
    const placeholderText = document.getElementById('placeholderText');
    const scanOverlay = document.getElementById('scanOverlay');
    
    // Stop scanning loop
    if (window.__cleanupScanner) {
        window.__cleanupScanner();
    }
    
    // Stop all tracks
    if (stream) {
        try {
            stream.getTracks().forEach(track => track.stop());
        } catch(e) {}
        stream = null;
    }
    
    // Reset video
    if (video.srcObject) {
        try {
            video.srcObject = null;
        } catch(e) {}
    }
    video.style.display = 'none';
    video.classList.remove('active');
    
    placeholderText.style.display = 'block';
    scanOverlay.classList.remove('active');
    
    isScanning = false;
    document.getElementById('status-text').textContent = '⏹ Camera stopped';
    document.getElementById('startBtn').innerHTML = '📷 Start Camera';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('result').className = 'result-info';
    document.getElementById('result').textContent = '📱 Camera is off';
}

// ============================================
// HANDLE QR SCAN
// ============================================
function handleScan(guestID) {
    // Play sound
    playBeep(600, 100);
    
    document.getElementById('result').className = 'result-info';
    document.getElementById('result').textContent = '⏳ Processing...';
    document.getElementById('status-text').textContent = '🔍 Checking guest...';

    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'checkin',
            id: guestID
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('Network error: ' + response.status);
        }
        return response.json();
    })
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('result').className = 'result-success';
            document.getElementById('result').textContent = '✅ ' + data.name + ' checked in!';
            document.getElementById('status-text').textContent = '🎉 Welcome ' + data.name + '!';
            playBeep(880, 200);
            if (navigator.vibrate) navigator.vibrate(200);

        } else if (data.status === 'walkin') {
            document.getElementById('result').className = 'result-walkin';
            document.getElementById('result').textContent = '🆕 New guest! Please register below.';
            document.getElementById('walkin-form').style.display = 'block';
            document.getElementById('status-text').textContent = '📝 Fill the registration form';
            playBeep(500, 300);
            if (navigator.vibrate) navigator.vibrate([100, 100, 100]);

        } else if (data.status === 'error') {
            document.getElementById('result').className = 'result-error';
            document.getElementById('result').textContent = data.message || '❌ Error!';
            document.getElementById('status-text').textContent = '❌ Check-in failed';
            playBeep(300, 400);
            if (navigator.vibrate) navigator.vibrate(500);

        } else {
            document.getElementById('result').className = 'result-error';
            document.getElementById('result').textContent = '❌ Unknown error';
        }
    })
    .catch(error => {
        console.error('Fetch error:', error);
        document.getElementById('result').className = 'result-error';
        document.getElementById('result').textContent = '❌ Network error! Check URL';
        document.getElementById('status-text').textContent = '⚠️ Error: ' + error.message;
    });
}

// ============================================
// WALK-IN REGISTRATION
// ============================================
function registerWalkin(e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !email) {
        alert('Please fill in Name and Email');
        return;
    }

    document.getElementById('result').className = 'result-info';
    document.getElementById('result').textContent = '⏳ Registering...';

    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'register',
            name: name,
            email: email,
            phone: phone
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            document.getElementById('result').className = 'result-success';
            document.getElementById('result').textContent = '✅ ' + data.name + ' registered!';
            document.getElementById('walkin-form').style.display = 'none';
            document.getElementById('walkin-form').reset();
            document.getElementById('status-text').textContent = '🎉 Welcome ' + data.name + '!';
            playBeep(880, 300);
            if (navigator.vibrate) navigator.vibrate([100, 50, 100]);
        } else {
            document.getElementById('result').className = 'result-error';
            document.getElementById('result').textContent = '❌ Registration failed';
        }
    })
    .catch(error => {
        document.getElementById('result').className = 'result-error';
        document.getElementById('result').textContent = '❌ Network error!';
    });
}

function closeWalkinForm() {
    document.getElementById('walkin-form').style.display = 'none';
    document.getElementById('walkin-form').reset();
    document.getElementById('result').className = 'result-info';
    document.getElementById('result').textContent = '📱 Scan a QR code';
    document.getElementById('status-text').textContent = '✅ Ready to scan';
}

// ============================================
// BEEP SOUND
// ============================================
function playBeep(freq, duration) {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.frequency.value = freq;
        oscillator.type = 'sine';
        gainNode.gain.value = 0.15;
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + duration / 1000);
    } catch(e) {
        // Silent fallback
    }
}

// ============================================
// AUTO-START (Check if camera works)
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    const isMobile = /Android|iPhone|iPad|iPod/i.test(navigator.userAgent);
    if (isMobile) {
        document.getElementById('status-text').textContent = '📱 Tap "Start Camera" to begin';
    }
    
    console.log('📱 Event Scanner loaded');
    console.log('🔗 API URL:', APP_SCRIPT_URL);
});

// ============================================
// HANDLE PAGE UNLOAD
// ============================================
window.addEventListener('beforeunload', function() {
    stopScanner();
});
</script>

</body>
</html>
