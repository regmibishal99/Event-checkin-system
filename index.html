<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Event Check-in</title>
<script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #0d0f14; --surface: #181b24; --border: #262b38;
    --accent: #4f8ef7; --success: #34d399; --error: #f87171;
    --warn: #fbbf24; --text: #e8eaf0; --muted: #6b7280;
  }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; padding: 16px; gap: 14px;
  }
  h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  h1 span { color: var(--accent); }
  .cam-wrap {
    width: 100%; max-width: 360px; aspect-ratio: 1;
    border-radius: 18px; overflow: hidden; background: #000;
    position: relative; border: 2px solid var(--border);
  }
  #video { width: 100%; height: 100%; object-fit: cover; display: block; }
  canvas#overlay {
    position: absolute; inset: 0; width: 100%; height: 100%; pointer-events: none;
  }
  .cam-idle {
    position: absolute; inset: 0; display: flex; flex-direction: column;
    align-items: center; justify-content: center; gap: 8px;
    color: var(--muted); font-size: 14px;
  }
  .cam-idle svg { width: 48px; height: 48px; opacity: 0.4; }
  .frame {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 60%; height: 60%; pointer-events: none;
  }
  .frame::before, .frame::after, .frame span::before, .frame span::after {
    content: ''; position: absolute; width: 22px; height: 22px;
    border-color: var(--accent); border-style: solid; border-width: 0;
  }
  .frame::before  { top:0; left:0;  border-top-width:3px; border-left-width:3px;  border-radius:3px 0 0 0; }
  .frame::after   { top:0; right:0; border-top-width:3px; border-right-width:3px; border-radius:0 3px 0 0; }
  .frame span::before { bottom:0; left:0;  border-bottom-width:3px; border-left-width:3px;  border-radius:0 0 0 3px; }
  .frame span::after  { bottom:0; right:0; border-bottom-width:3px; border-right-width:3px; border-radius:0 0 3px 0; }
  .scan-line {
    position: absolute; left: 20%; right: 20%; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent), transparent);
    animation: sweep 1.8s ease-in-out infinite; border-radius: 2px;
  }
  @keyframes sweep { 0%{top:20%} 50%{top:80%} 100%{top:20%} }
  #toast {
    width: 100%; max-width: 360px; padding: 14px 16px; border-radius: 12px;
    font-size: 15px; font-weight: 600; text-align: center;
    background: var(--surface); color: var(--muted); border: 1.5px solid var(--border);
    min-height: 52px; display: flex; align-items: center; justify-content: center;
    transition: background 0.2s, color 0.2s, border-color 0.2s;
  }
  #toast.success { background:rgba(52,211,153,.1); color:var(--success); border-color:var(--success); }
  #toast.error   { background:rgba(248,113,113,.1); color:var(--error);   border-color:var(--error); }
  #toast.loading { background:rgba(79,142,247,.1);  color:var(--accent);  border-color:var(--accent); }
  #toast.warn    { background:rgba(251,191,36,.1);  color:var(--warn);    border-color:var(--warn); }
  .btn {
    width: 100%; max-width: 360px; padding: 15px; border: none; border-radius: 12px;
    font-size: 16px; font-weight: 700; cursor: pointer;
    transition: opacity .15s, transform .1s; letter-spacing: 0.2px;
  }
  .btn:active { transform: scale(0.97); opacity: 0.85; }
  .btn:disabled { opacity: 0.4; cursor: default; }
  .btn-primary { background: var(--accent); color: #fff; }
  .btn-danger  { background: #ef4444; color: #fff; }
  .btn-ghost   { background: var(--surface); color: var(--text); border: 1.5px solid var(--border); }
  .row { display: flex; gap: 8px; width: 100%; max-width: 360px; }
  input {
    flex: 1; padding: 13px 14px; border-radius: 12px;
    border: 1.5px solid var(--border); background: var(--surface);
    color: var(--text); font-size: 15px;
  }
  input:focus { outline: none; border-color: var(--accent); }
  input::placeholder { color: var(--muted); }
  #walkinForm {
    display: none; flex-direction: column; gap: 10px;
    width: 100%; max-width: 360px; background: var(--surface);
    border: 1.5px solid var(--warn); border-radius: 14px; padding: 16px;
  }
  #walkinForm h2 { font-size: 15px; color: var(--warn); text-align: center; }
  .divider {
    width: 100%; max-width: 360px; text-align: center; font-size: 12px;
    color: var(--muted); border-top: 1px solid var(--border); padding-top: 4px;
  }
</style>
</head>
<body>

<h1>🎫 Event <span>Check-in</span></h1>

<div class="cam-wrap">
  <video id="video" playsinline autoplay muted></video>
  <canvas id="overlay"></canvas>
  <div class="cam-idle" id="camIdle">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
      <rect x="2" y="7" width="15" height="13" rx="2"/><path d="M17 9l3-2v10l-3-2"/>
    </svg>
    Camera off
  </div>
  <div class="frame" id="frameEl" style="display:none"><span></span></div>
  <div class="scan-line" id="scanLine" style="display:none"></div>
</div>

<div id="toast">Ready to scan</div>

<button class="btn btn-primary" id="startBtn" onclick="startCamera()">📷 Start Camera</button>
<button class="btn btn-danger"  id="stopBtn"  onclick="stopCamera()" style="display:none">⏹ Stop Camera</button>

<div class="divider">or enter ID manually</div>

<div class="row">
  <input id="manualId" type="text" placeholder="Guest ID (e.g. 1, 2, 3)" inputmode="numeric">
  <button class="btn btn-ghost" style="width:auto;padding:13px 18px;flex-shrink:0" onclick="manualCheckin()">Go</button>
</div>

<div id="walkinForm">
  <h2>🆕 New Guest — Register Below</h2>
  <input id="wiName"  type="text"  placeholder="Full Name *">
  <input id="wiEmail" type="email" placeholder="Email *">
  <input id="wiPhone" type="tel"   placeholder="Phone (optional)">
  <button class="btn btn-primary" onclick="registerWalkin()">✅ Register & Check-in</button>
  <button class="btn btn-ghost"   onclick="closeWalkin()">Cancel</button>
</div>

<script>
// ── PASTE YOUR GOOGLE APPS SCRIPT WEB APP URL HERE ──────────
const SHEET_URL = 'https://script.google.com/macros/s/AKfycbyRAk0lMbS_0MrJCrBSKDxot6WmVAmqmxN8VCNxcrNJvXNhTErFUUcGLVy1SM_aVnm6/exec';
// ────────────────────────────────────────────────────────────

let stream = null, animFrame = null, lastCode = '', lastCodeTime = 0;
const COOLDOWN = 3000;
const video   = document.getElementById('video');
const overlay = document.getElementById('overlay');
const ctx     = overlay.getContext('2d');

function toast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = type || '';
}

async function startCamera() {
  toast('Starting camera…', 'loading');
  document.getElementById('startBtn').disabled = true;
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: { ideal: 'environment' }, width: { ideal: 1280 }, height: { ideal: 1280 } },
      audio: false
    });
    video.srcObject = stream;
    await video.play();
    document.getElementById('camIdle').style.display = 'none';
    document.getElementById('frameEl').style.display = '';
    document.getElementById('scanLine').style.display = '';
    document.getElementById('startBtn').style.display = 'none';
    document.getElementById('stopBtn').style.display = '';
    toast('Point camera at a QR code', 'loading');
    tick();
  } catch(err) {
    toast('❌ Camera error: ' + err.message, 'error');
    document.getElementById('startBtn').disabled = false;
    alert('Camera access denied.\n\nPlease allow camera in your browser settings, then reload the page.');
  }
}

function stopCamera() {
  if (animFrame) cancelAnimationFrame(animFrame);
  if (stream) stream.getTracks().forEach(t => t.stop());
  stream = null; animFrame = null;
  video.srcObject = null;
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  document.getElementById('camIdle').style.display = '';
  document.getElementById('frameEl').style.display = 'none';
  document.getElementById('scanLine').style.display = 'none';
  document.getElementById('startBtn').style.display = '';
  document.getElementById('startBtn').disabled = false;
  document.getElementById('stopBtn').style.display = 'none';
  toast('Camera stopped');
}

function tick() {
  if (!stream) return;
  overlay.width  = video.videoWidth  || 300;
  overlay.height = video.videoHeight || 300;
  if (video.readyState === video.HAVE_ENOUGH_DATA && overlay.width > 0) {
    ctx.drawImage(video, 0, 0, overlay.width, overlay.height);
    const imgData = ctx.getImageData(0, 0, overlay.width, overlay.height);
    const code = jsQR(imgData.data, imgData.width, imgData.height, { inversionAttempts: 'dontInvert' });
    if (code) {
      const now = Date.now();
      if (code.data !== lastCode || now - lastCodeTime > COOLDOWN) {
        lastCode = code.data;
        lastCodeTime = now;
        highlightQR(code.location);
        handleCheckin(code.data.trim());
      }
    } else {
      ctx.clearRect(0, 0, overlay.width, overlay.height);
    }
  }
  animFrame = requestAnimationFrame(tick);
}

function highlightQR(loc) {
  ctx.clearRect(0, 0, overlay.width, overlay.height);
  ctx.strokeStyle = '#34d399';
  ctx.lineWidth = 3;
  ctx.beginPath();
  ctx.moveTo(loc.topLeftCorner.x,     loc.topLeftCorner.y);
  ctx.lineTo(loc.topRightCorner.x,    loc.topRightCorner.y);
  ctx.lineTo(loc.bottomRightCorner.x, loc.bottomRightCorner.y);
  ctx.lineTo(loc.bottomLeftCorner.x,  loc.bottomLeftCorner.y);
  ctx.closePath();
  ctx.stroke();
}

async function handleCheckin(id) {
  if (!id) return;
  toast('⏳ Checking in…', 'loading');
  try {
    const res = await fetch(SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'checkin', id: id })
    });
    const data = await res.json();

    if (data.status === 'success') {
      toast('✅ ' + data.name + ' — Checked In! 🎉', 'success');
      beep('success');
      if (navigator.vibrate) navigator.vibrate([100, 50, 100]);

    } else if (data.status === 'error') {
      toast(data.message, 'error');
      beep('error');

    } else if (data.status === 'walkin') {
      toast('🆕 Guest not found — please register', 'warn');
      document.getElementById('walkinForm').style.display = 'flex';
      beep('warn');

    } else {
      toast('❌ Unknown error', 'error');
    }
  } catch(err) {
    toast('❌ Network error — check your URL', 'error');
    console.error(err);
  }
}

function manualCheckin() {
  const id = document.getElementById('manualId').value.trim();
  if (!id) { toast('Enter a Guest ID first', 'error'); return; }
  document.getElementById('manualId').value = '';
  handleCheckin(id);
}
document.getElementById('manualId').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') manualCheckin();
});

async function registerWalkin() {
  const name  = document.getElementById('wiName').value.trim();
  const email = document.getElementById('wiEmail').value.trim();
  const phone = document.getElementById('wiPhone').value.trim();
  if (!name || !email) { toast('Name and Email are required', 'error'); return; }
  toast('⏳ Registering…', 'loading');
  try {
    const res = await fetch(SHEET_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'register', name: name, email: email, phone: phone })
    });
    const data = await res.json();
    if (data.status === 'success') {
      toast('✅ ' + data.name + ' registered & checked in!', 'success');
      closeWalkin();
      beep('success');
    } else {
      toast('❌ Registration failed', 'error');
    }
  } catch(err) {
    toast('❌ Network error', 'error');
  }
}

function closeWalkin() {
  document.getElementById('walkinForm').style.display = 'none';
  ['wiName','wiEmail','wiPhone'].forEach(function(id) {
    document.getElementById(id).value = '';
  });
  toast('Ready to scan');
}

function beep(type) {
  try {
    const ac  = new AudioContext();
    const osc = ac.createOscillator();
    const g   = ac.createGain();
    osc.connect(g); g.connect(ac.destination); g.gain.value = 0.12;
    if (type === 'success') { osc.frequency.value = 880; osc.start(); osc.stop(ac.currentTime + 0.15); }
    else if (type === 'error') { osc.frequency.value = 280; osc.start(); osc.stop(ac.currentTime + 0.3); }
    else { osc.frequency.value = 600; osc.start(); osc.stop(ac.currentTime + 0.15); }
  } catch(e) {}
}
</script>
</body>
</html>
