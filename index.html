<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR Scanner</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            background: #0a0a0a;
            color: white;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px;
        }
        
        .header {
            text-align: center;
            margin-bottom: 20px;
        }
        
        .header h1 {
            font-size: 28px;
            background: linear-gradient(135deg, #667eea, #764ba2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        
        .header p {
            color: #888;
            font-size: 14px;
        }
        
        .scanner-box {
            width: 100%;
            max-width: 400px;
            aspect-ratio: 1/1;
            background: #1a1a1a;
            border-radius: 20px;
            overflow: hidden;
            border: 3px solid #667eea;
            position: relative;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        #video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: none;
        }
        
        #video.active {
            display: block;
        }
        
        .placeholder {
            color: #555;
            text-align: center;
            font-size: 18px;
        }
        
        .placeholder .icon {
            font-size: 60px;
            display: block;
            margin-bottom: 10px;
        }
        
        .scan-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            display: none;
        }
        
        .scan-overlay.active {
            display: block;
        }
        
        .scan-frame {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 70%;
            height: 70%;
            border: 2px solid rgba(102, 126, 234, 0.8);
            border-radius: 15px;
            box-shadow: 0 0 0 4000px rgba(0,0,0,0.5);
        }
        
        .scan-line {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 60%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #667eea, transparent);
            animation: scan 2s infinite;
        }
        
        @keyframes scan {
            0% { transform: translate(-50%, -60%); }
            50% { transform: translate(-50%, 60%); }
            100% { transform: translate(-50%, -60%); }
        }
        
        .controls {
            margin: 20px 0;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 400px;
        }
        
        .btn {
            padding: 15px 30px;
            border: none;
            border-radius: 50px;
            font-size: 18px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            flex: 1;
            min-width: 120px;
        }
        
        .btn-start {
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            box-shadow: 0 4px 15px rgba(102, 126, 234, 0.4);
        }
        
        .btn-start:active {
            transform: scale(0.95);
        }
        
        .btn-stop {
            background: #e53e3e;
            color: white;
        }
        
        .btn-scan {
            background: linear-gradient(135deg, #48bb78, #38a169);
            color: white;
            box-shadow: 0 4px 15px rgba(72, 187, 120, 0.4);
            font-size: 20px;
            padding: 18px 30px;
        }
        
        .btn-scan:active {
            transform: scale(0.95);
        }
        
        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        #result {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            border-radius: 15px;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            margin: 10px 0;
            min-height: 60px;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        
        .result-idle {
            background: rgba(255,255,255,0.05);
            color: #888;
        }
        
        .result-scanning {
            background: rgba(102, 126, 234, 0.2);
            color: #667eea;
        }
        
        .result-done {
            background: rgba(72, 187, 120, 0.2);
            color: #48bb78;
        }
        
        .result-error {
            background: rgba(245, 87, 108, 0.2);
            color: #f5576c;
        }
        
        .result-walkin {
            background: rgba(251, 191, 36, 0.2);
            color: #f6ad55;
        }
        
        #status {
            font-size: 14px;
            color: #666;
            text-align: center;
            margin: 5px 0;
        }
        
        .manual-entry {
            width: 100%;
            max-width: 400px;
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }
        
        .manual-entry input {
            flex: 1;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #333;
            background: #1a1a1a;
            color: white;
            font-size: 16px;
        }
        
        .manual-entry input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        .manual-entry input::placeholder {
            color: #555;
        }
        
        .btn-small {
            padding: 12px 20px;
            font-size: 14px;
            min-width: auto;
            flex: 0 0 auto;
        }
        
        #walkin-form {
            display: none;
            width: 100%;
            max-width: 400px;
            padding: 20px;
            background: #1a1a1a;
            border-radius: 15px;
            margin-top: 10px;
            border: 1px solid #333;
        }
        
        #walkin-form h3 {
            text-align: center;
            color: #f6ad55;
            margin-bottom: 15px;
        }
        
        #walkin-form input {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border: 1px solid #333;
            border-radius: 10px;
            background: #0a0a0a;
            color: white;
            font-size: 16px;
        }
        
        #walkin-form input:focus {
            outline: none;
            border-color: #667eea;
        }
        
        #walkin-form input::placeholder {
            color: #555;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            margin-left: 10px;
        }
        
        .badge-on {
            background: #48bb78;
            color: white;
        }
        
        .badge-off {
            background: #666;
            color: white;
        }
        
        @media (max-width: 480px) {
            .header h1 { font-size: 22px; }
            .btn { font-size: 16px; padding: 12px 20px; }
            .btn-scan { font-size: 18px; padding: 15px 20px; }
            #result { font-size: 16px; }
        }
    </style>
</head>
<body>

<div class="header">
    <h1>🎫 QR Scanner</h1>
    <p>Scan QR code to check-in</p>
</div>

<div class="scanner-box">
    <video id="video" playsinline autoplay></video>
    <div class="placeholder" id="placeholder">
        <span class="icon">📷</span>
        Camera Off
    </div>
    <div class="scan-overlay" id="scanOverlay">
        <div class="scan-frame"></div>
        <div class="scan-line"></div>
    </div>
</div>

<div id="status">📱 Tap "Start Camera"</div>

<div class="controls">
    <button class="btn btn-start" id="startBtn" onclick="startCamera()">📷 Start Camera</button>
    <button class="btn btn-stop" id="stopBtn" onclick="stopCamera()" disabled>⏹ Stop</button>
</div>

<div class="controls">
    <button class="btn btn-scan" id="scanBtn" onclick="scanNow()" disabled>
        📸 SCAN NOW
    </button>
</div>

<div id="result" class="result-idle">📱 Ready to scan</div>

<div id="walkin-form">
    <h3>🆕 New Guest Registration</h3>
    <form onsubmit="registerWalkin(event)">
        <input type="text" id="name" placeholder="Full Name *" required>
        <input type="email" id="email" placeholder="Email *" required>
        <input type="tel" id="phone" placeholder="Phone Number">
        <button type="submit" class="btn btn-start" style="width:100%;">✅ Register & Check-in</button>
    </form>
    <button onclick="closeWalkinForm()" style="width:100%; padding:12px; margin-top:10px; background:#333; color:white; border:none; border-radius:10px; cursor:pointer;">✕ Cancel</button>
</div>

<div class="manual-entry">
    <input type="text" id="manualQR" placeholder="Enter ID manually (e.g. 1)">
    <button onclick="manualCheckin()" class="btn btn-start btn-small">Check-in</button>
</div>

<!-- ========================================== -->
<!-- QR SCANNER LIBRARY -->
<!-- ========================================== -->
<script src="https://cdn.jsdelivr.net/npm/instascan@1.0.0/instascan.min.js">
</script>

<script>
// ============================================
// CONFIGURATION - UPDATE THIS!
// ============================================
const APP_SCRIPT_URL = 'YOUR_GOOGLE_APPS_SCRIPT_URL_HERE';

// ============================================
// VARIABLES
// ============================================
let scanner = null;
let isCameraOn = false;
let isScanning = false;
let lastScanned = '';

// ============================================
// START CAMERA
// ============================================
function startCamera() {
    const startBtn = document.getElementById('startBtn');
    const stopBtn = document.getElementById('stopBtn');
    const scanBtn = document.getElementById('scanBtn');
    const status = document.getElementById('status');
    const video = document.getElementById('video');
    const placeholder = document.getElementById('placeholder');
    const scanOverlay = document.getElementById('scanOverlay');
    const result = document.getElementById('result');
    
    startBtn.disabled = true;
    startBtn.textContent = '⏳ Loading...';
    status.textContent = '🔍 Initializing camera...';
    result.className = 'result-scanning';
    result.textContent = '⏳ Starting camera...';

    Instascan.Camera.getCameras()
        .then(function(cameras) {
            if (cameras.length === 0) {
                throw new Error('No cameras found');
            }
            
            let selectedCamera = cameras[0];
            for (let cam of cameras) {
                if (cam.name && cam.name.toLowerCase().includes('back')) {
                    selectedCamera = cam;
                    break;
                }
            }
            
            scanner = new Instascan.Scanner({
                video: video,
                mirror: false,
                captureImage: false,
                backgroundScan: false,
                scanPeriod: 0.5
            });
            
            scanner.addListener('scan', function(content) {
                // Auto-scan when camera is on and scan button is pressed
                if (isScanning && lastScanned !== content) {
                    lastScanned = content;
                    isScanning = false;
                    scanBtn.textContent = '📸 SCAN NOW';
                    scanBtn.style.background = 'linear-gradient(135deg, #48bb78, #38a169)';
                    handleScan(content);
                    setTimeout(() => { lastScanned = ''; }, 2000);
                }
            });
            
            return scanner.start(selectedCamera);
        })
        .then(function() {
            isCameraOn = true;
            video.style.display = 'block';
            video.classList.add('active');
            placeholder.style.display = 'none';
            scanOverlay.classList.add('active');
            
            status.textContent = '✅ Camera ready - Tap SCAN NOW';
            startBtn.textContent = '📷 Active';
            startBtn.disabled = false;
            stopBtn.disabled = false;
            scanBtn.disabled = false;
            result.className = 'result-idle';
            result.textContent = '📱 Tap "SCAN NOW" to scan QR';
            
            document.getElementById('status').innerHTML = '✅ Camera ready <span class="badge badge-on">ON</span>';
        })
        .catch(function(err) {
            status.textContent = '❌ ' + err.message;
            startBtn.textContent = '📷 Start Camera';
            startBtn.disabled = false;
            result.className = 'result-error';
            result.textContent = '❌ Camera error';
            
            alert('❌ Camera Error\n\n' + err.message + '\n\n' +
                  'Please allow camera access in browser settings.');
        });
}

// ============================================
// STOP CAMERA
// ============================================
function stopCamera() {
    if (scanner) {
        try {
            scanner.stop();
        } catch(e) {}
        scanner = null;
    }
    
    const video = document.getElementById('video');
    const placeholder = document.getElementById('placeholder');
    const scanOverlay = document.getElementById('scanOverlay');
    
    video.style.display = 'none';
    video.classList.remove('active');
    placeholder.style.display = 'block';
    scanOverlay.classList.remove('active');
    
    isCameraOn = false;
    isScanning = false;
    
    document.getElementById('startBtn').textContent = '📷 Start Camera';
    document.getElementById('startBtn').disabled = false;
    document.getElementById('stopBtn').disabled = true;
    document.getElementById('scanBtn').disabled = true;
    document.getElementById('scanBtn').textContent = '📸 SCAN NOW';
    document.getElementById('status').innerHTML = '⏹ Camera stopped <span class="badge badge-off">OFF</span>';
    document.getElementById('result').className = 'result-idle';
    document.getElementById('result').textContent = '📱 Camera is off';
}

// ============================================
// SCAN NOW - Capture QR
// ============================================
function scanNow() {
    if (!isCameraOn) {
        alert('Please start camera first!');
        return;
    }
    
    const scanBtn = document.getElementById('scanBtn');
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    
    isScanning = true;
    scanBtn.textContent = '⏳ Scanning...';
    scanBtn.style.background = '#f6ad55';
    result.className = 'result-scanning';
    result.textContent = '🔍 Scanning... Point at QR code';
    status.textContent = '🔍 Scanning for QR code...';
    
    // If no QR detected after 5 seconds, reset
    setTimeout(() => {
        if (isScanning) {
            isScanning = false;
            scanBtn.textContent = '📸 SCAN NOW';
            scanBtn.style.background = 'linear-gradient(135deg, #48bb78, #38a169)';
            result.className = 'result-idle';
            result.textContent = '⏳ No QR detected. Try again.';
            status.textContent = '⏳ No QR detected';
        }
    }, 5000);
}

// ============================================
// HANDLE QR SCAN
// ============================================
function handleScan(guestID) {
    const result = document.getElementById('result');
    const status = document.getElementById('status');
    
    result.className = 'result-scanning';
    result.textContent = '⏳ Processing...';
    status.textContent = '🔍 Checking guest...';

    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'checkin',
            id: guestID.trim()
        })
    })
    .then(response => {
        if (!response.ok) {
            throw new Error('HTTP Error: ' + response.status);
        }
        return response.json();
    })
    .then(data => {
        if (data.status === 'success') {
            result.className = 'result-done';
            result.textContent = '✅ ' + data.name + ' - CHECKED IN! 🎉';
            status.textContent = '🎉 Welcome ' + data.name + '!';
            playSound('success');
            if (navigator.vibrate) navigator.vibrate(200);

        } else if (data.status === 'walkin') {
            result.className = 'result-walkin';
            result.textContent = '🆕 New guest! Please register below.';
            document.getElementById('walkin-form').style.display = 'block';
            status.textContent = '📝 Fill the registration form';
            playSound('walkin');

        } else if (data.status === 'error') {
            result.className = 'result-error';
            result.textContent = '❌ ' + data.message;
            status.textContent = '❌ Check-in failed';
            playSound('error');

        } else {
            result.className = 'result-error';
            result.textContent = '❌ Unknown error';
        }
    })
    .catch(error => {
        result.className = 'result-error';
        result.textContent = '❌ Network error! Check URL';
        status.textContent = '⚠️ Error: ' + error.message;
        playSound('error');
    });
}

// ============================================
// MANUAL CHECK-IN
// ============================================
function manualCheckin() {
    const id = document.getElementById('manualQR').value.trim();
    if (id) {
        handleScan(id);
        document.getElementById('manualQR').value = '';
    } else {
        alert('Please enter an ID (e.g., 1, 2, 3)');
    }
}

// ============================================
// WALK-IN REGISTRATION
// ============================================
function registerWalkin(e) {
    e.preventDefault();

    const name = document.getElementById('name').value.trim();
    const email = document.getElementById('email').value.trim();
    const phone = document.getElementById('phone').value.trim();

    if (!name || !email) {
        alert('Please fill in Name and Email');
        return;
    }

    const result = document.getElementById('result');
    result.className = 'result-scanning';
    result.textContent = '⏳ Registering...';

    fetch(APP_SCRIPT_URL, {
        method: 'POST',
        headers: {
            'Content-Type': 'application/json',
        },
        body: JSON.stringify({
            action: 'register',
            name: name,
            email: email,
            phone: phone
        })
    })
    .then(response => response.json())
    .then(data => {
        if (data.status === 'success') {
            result.className = 'result-done';
            result.textContent = '✅ ' + data.name + ' registered & checked in!';
            document.getElementById('walkin-form').style.display = 'none';
            document.getElementById('walkin-form').reset();
            document.getElementById('status').textContent = '🎉 Welcome ' + data.name + '!';
            playSound('success');
        } else {
            result.className = 'result-error';
            result.textContent = '❌ Registration failed';
        }
    })
    .catch(error => {
        result.className = 'result-error';
        result.textContent = '❌ Network error!';
    });
}

function closeWalkinForm() {
    document.getElementById('walkin-form').style.display = 'none';
    document.getElementById('walkin-form').reset();
    document.getElementById('result').className = 'result-idle';
    document.getElementById('result').textContent = '📱 Ready to scan';
    document.getElementById('status').textContent = '✅ Ready';
}

// ============================================
// SOUND EFFECTS
// ============================================
function playSound(type) {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        gainNode.gain.value = 0.15;
        
        if (type === 'success') {
            oscillator.frequency.setValueAtTime(880, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(1100, audioCtx.currentTime + 0.1);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        } else if (type === 'error') {
            oscillator.frequency.setValueAtTime(300, audioCtx.currentTime);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.3);
        } else if (type === 'walkin') {
            oscillator.frequency.setValueAtTime(500, audioCtx.currentTime);
            oscillator.frequency.setValueAtTime(700, audioCtx.currentTime + 0.1);
            oscillator.start();
            oscillator.stop(audioCtx.currentTime + 0.2);
        }
    } catch(e) {}
}

// ============================================
// INITIALIZE
// ============================================
document.addEventListener('DOMContentLoaded', function() {
    console.log('📱 Scanner loaded');
    console.log('🔗 API URL:', APP_SCRIPT_URL);
    document.getElementById('status').innerHTML = '📱 Tap "Start Camera" <span class="badge badge-off">OFF</span>';
});

// ============================================
// CLEANUP
// ============================================
window.addEventListener('beforeunload', function() {
    if (scanner) {
        try {
            scanner.stop();
        } catch(e) {}
    }
});
</script>

</body>
</html>
